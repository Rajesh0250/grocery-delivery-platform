version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: grocerydb
      POSTGRES_USER: grocery
      POSTGRES_PASSWORD: grocery123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  pgdata:
